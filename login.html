<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — KahaniRang</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<!-- NAV -->
<nav class="auth-nav">
  <a href="index.html" class="logo">KahaniRang</a>
</nav>

<!-- LOGIN FORM -->
<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="auth-sub">Login to continue reading</p>

    <form id="loginForm" novalidate>
      <div id="errorMsg" class="auth-error"></div>

      <input type="email" id="email" placeholder="Email address" required autocomplete="email" />
      <input type="password" id="password" placeholder="Password" required autocomplete="current-password" />

      <button type="submit" class="btn-primary" id="loginBtn">Login</button>
    </form>

    <div class="switch">Don't have an account? <a href="signup.html">Sign up free</a></div>
  </div>
</div>

<script type="module" src="js/login.js"></script>
</body>
</html>
